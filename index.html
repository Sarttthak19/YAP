<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yap - Drop in and chat</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <button id="theme-toggle" class="theme-btn">☀️</button>

    <div class="container">
        <div id="setup-screen" class="active">
            <h1 class="logo">Yap.</h1>
            <p class="subtitle">No logins. Just vibes.</p>
            
            <input type="text" id="username" placeholder="Enter your name (e.g., Gaurav)" autocomplete="off">
            
            <div class="actions">
                <button id="create-btn" class="primary-btn">Create Room</button>
                <div class="divider"><span>OR</span></div>
                <div class="join-group">
                    <input type="text" id="room-code" placeholder="Enter Room Code" autocomplete="off">
                    <button id="join-btn" class="secondary-btn">Join</button>
                </div>
            </div>
        </div>

        <div id="chat-screen">
            <div class="chat-header">
                <div class="room-info">
                    <h2>Yap.</h2>
                    <span class="badge">Room: <strong id="display-room"></strong></span>
                </div>
                <div class="header-actions">
                    <button id="invite-btn" class="action-btn">🔗 Invite</button>
                    <button id="leave-btn" class="action-btn leave-style">Leave</button>
                </div>
            </div>
            
            <div id="chat-box" class="chat-box">
                </div>
            
            <div class="input-area">
                <div id="emoji-picker" class="emoji-picker">
                    <span class="emoji">😀</span><span class="emoji">😂</span><span class="emoji">😭</span>
                    <span class="emoji">😍</span><span class="emoji">😎</span><span class="emoji">💀</span>
                    <span class="emoji">👀</span><span class="emoji">🔥</span><span class="emoji">✨</span>
                    <span class="emoji">💯</span><span class="emoji">👍</span><span class="emoji">🙏</span>
                </div>
                
                <button id="emoji-btn" class="icon-btn">😀</button>
                <input type="text" id="message-input" placeholder="Start yapping..." autocomplete="off">
                <button id="send-btn" class="send-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
